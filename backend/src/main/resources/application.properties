# ============================================================
# Smart Coaching — LOCAL CONFIG (H2 Database)
# ============================================================

# ----- Server -----
server.port=8080

# ----- H2 Database (Local Development) -----
spring.datasource.url=jdbc:h2:file:./data/smartcoaching-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ----- Hikari Connection Pool -----
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ----- Database Initialization -----
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ----- Open-in-View -----
spring.jpa.open-in-view=true

# ----- CORS -----
spring.web.cors.allowed-origins=*

# ----- Logging -----
logging.level.com.smartcoaching=INFO